<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テイクアウト注文 | Tricy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: #fef9f0;
      color: #333;
      min-height: 100vh;
    }

    .header {
      background: #b45309;
      color: white;
      padding: 16px 20px;
      text-align: center;
    }
    .header h1 { font-size: 1.2rem; }
    .header p  { font-size: 0.85rem; margin-top: 4px; opacity: 0.9; }

    .steps {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 14px 20px;
      background: white;
      border-bottom: 1px solid #e5e7eb;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.8rem;
      color: #9ca3af;
    }
    .step.active { color: #b45309; font-weight: bold; }
    .step.done   { color: #16a34a; }
    .step-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid currentColor;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: bold;
    }
    .step.done .step-num { background: #16a34a; color: white; border-color: #16a34a; }
    .step-sep { width: 28px; height: 2px; background: #e5e7eb; margin: 0 4px; }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 14px 40px;
    }

    .section {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .section-title {
      font-size: 0.88rem;
      font-weight: bold;
      color: #b45309;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #fde68a;
    }

    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 0.84rem; color: #555; margin-bottom: 4px; }
    .required::after {
      content: '必須';
      background: #b45309; color: white;
      font-size: 0.65rem; padding: 1px 5px;
      border-radius: 3px; margin-left: 6px;
    }
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    select {
      width: 100%; padding: 10px 12px;
      border: 1px solid #d1d5db; border-radius: 8px;
      font-size: 1rem; font-family: inherit;
      outline: none; transition: border-color 0.2s;
      background: white;
    }
    input:focus, select:focus { border-color: #b45309; }

    /* メニューセクションヘッダー */
    .menu-cat {
      font-size: 0.84rem;
      font-weight: bold;
      color: #374151;
      padding: 10px 0 4px;
      margin-top: 6px;
      border-bottom: 1px solid #fde68a;
    }
    .menu-cat:first-child { margin-top: 0; }
    .menu-cat-note {
      font-size: 0.75rem;
      color: #6b7280;
      padding: 3px 0 6px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-name  { font-size: 0.95rem; }
    .menu-price { font-size: 0.8rem; color: #6b7280; margin-top: 2px; }
    .qty-ctrl   { display: flex; align-items: center; gap: 10px; }
    .qty-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid #d1d5db; background: white;
      font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #6b7280; transition: all 0.15s; line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }
    .qty-btn:active  { transform: scale(0.88); }
    .qty-btn.plus    { border-color: #b45309; color: #b45309; }
    .qty-num { min-width: 22px; text-align: center; font-size: 1rem; font-weight: bold; }

    .btn {
      width: 100%; padding: 14px;
      border-radius: 10px; border: none;
      font-size: 1rem; font-weight: bold;
      cursor: pointer; transition: opacity 0.2s;
      font-family: inherit;
    }
    .btn:active   { opacity: 0.8; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary   { background: #b45309; color: white; }
    .btn-secondary { background: #f3f4f6; color: #374151; margin-top: 10px; }

    .confirm-row {
      display: flex; padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 0.9rem;
    }
    .confirm-row:last-child { border-bottom: none; }
    .confirm-label { color: #6b7280; min-width: 85px; flex-shrink: 0; }
    .confirm-value { flex: 1; font-weight: 500; word-break: break-all; }

    .total-box {
      background: #fef3c7; border-radius: 8px;
      padding: 12px 16px; text-align: right; margin-top: 10px;
    }
    .total-box .t-label  { font-size: 0.84rem; color: #6b7280; }
    .total-box .t-amount { font-size: 1.3rem; font-weight: bold; color: #b45309; }

    .done-wrap { text-align: center; padding: 24px 0 10px; }
    .done-icon { font-size: 3rem; margin-bottom: 12px; }
    .done-wrap h2 { font-size: 1.1rem; }
    .done-wrap p  { margin-top: 6px; color: #6b7280; font-size: 0.88rem; }
    .order-num-box {
      background: #fef3c7; border-radius: 10px;
      padding: 14px; margin: 18px 0 20px; text-align: center;
    }
    .order-num-box .on-label { font-size: 0.82rem; color: #6b7280; }
    .order-num-box .on-num   { font-size: 1.35rem; font-weight: bold; color: #b45309; letter-spacing: 1px; }
    .notice {
      background: #f0fdf4; border-left: 3px solid #16a34a;
      padding: 10px 12px; border-radius: 0 6px 6px 0;
      font-size: 0.85rem; color: #14532d; margin-top: 16px; line-height: 1.6;
    }

    .error-msg {
      background: #fef2f2; color: #dc2626;
      border-radius: 8px; padding: 10px 12px;
      font-size: 0.84rem; margin-top: 10px; display: none;
    }
    .loading { text-align: center; padding: 24px; color: #9ca3af; font-size: 0.9rem; }

    .page        { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>

<!-- ======================================================
  GAS をデプロイしたら下記の URL を書き換えてください
======================================================= -->
<script>
  var GAS_URL = 'YOUR_GAS_DEPLOYMENT_URL'; // ← デプロイURL に変更
</script>

<div class="header">
  <h1 id="headerTitle">テイクアウト注文</h1>
  <p>ご注文はこちらからどうぞ</p>
</div>

<div class="steps">
  <div class="step active" id="step1"><div class="step-num">1</div><span>入力</span></div>
  <div class="step-sep"></div>
  <div class="step" id="step2"><div class="step-num">2</div><span>確認</span></div>
  <div class="step-sep"></div>
  <div class="step" id="step3"><div class="step-num">3</div><span>完了</span></div>
</div>

<div class="container">

  <!-- ページ1：入力フォーム -->
  <div class="page active" id="page1">
    <div class="section">
      <div class="section-title">お客様情報</div>
      <div class="form-group">
        <label class="required">お名前</label>
        <input type="text" id="name" placeholder="山田 太郎" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="required">メールアドレス</label>
        <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="required">電話番号</label>
        <input type="tel" id="phone" placeholder="090-0000-0000" autocomplete="tel">
      </div>
      <div class="form-group">
        <label class="required">受取時刻</label>
        <select id="pickupTime">
          <option value="">-- 選択してください --</option>
        </select>
      </div>
    </div>

    <div class="section">
      <div class="section-title">ご注文内容</div>
      <div id="menuList"><div class="loading">メニューを読み込み中...</div></div>
    </div>

    <div class="error-msg" id="err1"></div>
    <button class="btn btn-primary" onclick="goToConfirm()">注文内容を確認する →</button>
  </div>

  <!-- ページ2：確認 -->
  <div class="page" id="page2">
    <div class="section">
      <div class="section-title">お客様情報</div>
      <div id="confirmCustomer"></div>
    </div>
    <div class="section">
      <div class="section-title">ご注文品</div>
      <div id="confirmItems"></div>
      <div class="total-box">
        <div class="t-label">合計金額（税込）</div>
        <div class="t-amount" id="confirmTotal"></div>
      </div>
    </div>
    <div class="error-msg" id="err2"></div>
    <button class="btn btn-primary" id="submitBtn" onclick="doSubmit()">この内容で注文を確定する</button>
    <button class="btn btn-secondary" onclick="goBack()">← 入力内容を修正する</button>
  </div>

  <!-- ページ3：完了 -->
  <div class="page" id="page3">
    <div class="section">
      <div class="done-wrap">
        <div class="done-icon">✅</div>
        <h2>ご注文ありがとうございます</h2>
        <p>確認メールをお送りしました。</p>
        <div class="order-num-box">
          <div class="on-label">注文番号</div>
          <div class="on-num" id="resultOrderNum"></div>
        </div>
      </div>
      <div id="resultSummary"></div>
      <div class="notice">
        当日、店頭にてお支払いください。<br>
        ご来店をお待ちしております。
      </div>
    </div>
  </div>

</div>

<script>
  var menuSections = [];
  var orderData    = {};

  window.onload = function () {
    if (GAS_URL === 'YOUR_GAS_DEPLOYMENT_URL') {
      document.getElementById('menuList').innerHTML =
        '<p style="color:#dc2626;font-size:0.85rem;padding:8px 0">※ GAS_URL が未設定です。index.html の GAS_URL を書き換えてください。</p>';
      return;
    }

    fetch(GAS_URL + '?action=config')
      .then(function(r) { return r.json(); })
      .then(function(cfg) {
        document.getElementById('headerTitle').textContent = cfg.storeName + ' テイクアウト注文';
        buildPickupTimes(cfg.pickupStart, cfg.pickupEnd, cfg.pickupInterval);
      })
      .catch(function() {});

    fetch(GAS_URL + '?action=menu')
      .then(function(r) { return r.json(); })
      .then(function(sections) {
        menuSections = sections;
        renderMenu();
      })
      .catch(function() {
        document.getElementById('menuList').innerHTML =
          '<p style="color:#dc2626;font-size:0.85rem">メニューの読み込みに失敗しました。ページを再読み込みしてください。</p>';
      });
  };

  function buildPickupTimes(start, end, interval) {
    var sel = document.getElementById('pickupTime');
    var sh = parseInt(start.split(':')[0]), sm = parseInt(start.split(':')[1]);
    var eh = parseInt(end.split(':')[0]),   em = parseInt(end.split(':')[1]);
    var h = sh, m = sm;
    while (h < eh || (h === eh && m <= em)) {
      var label = pad(h) + ':' + pad(m);
      var opt = document.createElement('option');
      opt.value = label; opt.textContent = label;
      sel.appendChild(opt);
      m += interval;
      if (m >= 60) { h++; m -= 60; }
    }
  }

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function renderMenu() {
    var html = '';
    menuSections.forEach(function(section, si) {
      html += '<div class="menu-cat">' + esc(section.title) + '</div>';
      if (section.note) {
        html += '<div class="menu-cat-note">' + esc(section.note) + '</div>';
      }
      section.items.forEach(function(item, ii) {
        html += '<div class="menu-item">'
          + '<div><div class="menu-name">' + esc(item.name) + '</div>'
          + '<div class="menu-price">¥' + item.price.toLocaleString() + '</div></div>'
          + '<div class="qty-ctrl">'
          + '<button class="qty-btn minus" onclick="changeQty(' + si + ',' + ii + ',-1)">−</button>'
          + '<span class="qty-num" id="qty_' + si + '_' + ii + '">0</span>'
          + '<button class="qty-btn plus"  onclick="changeQty(' + si + ',' + ii + ',1)">＋</button>'
          + '</div></div>';
      });
    });
    document.getElementById('menuList').innerHTML = html;
  }

  function changeQty(si, ii, delta) {
    var el  = document.getElementById('qty_' + si + '_' + ii);
    var cur = parseInt(el.textContent, 10);
    el.textContent = Math.max(0, cur + delta);
  }

  function goToConfirm() {
    var name       = document.getElementById('name').value.trim();
    var email      = document.getElementById('email').value.trim();
    var phone      = document.getElementById('phone').value.trim();
    var pickupTime = document.getElementById('pickupTime').value;
    var errEl      = document.getElementById('err1');

    if (!name || !email || !phone || !pickupTime) {
      return showError(errEl, 'お客様情報をすべて入力してください。');
    }
    if (email.indexOf('@') < 1) {
      return showError(errEl, 'メールアドレスの形式が正しくありません。');
    }

    var items = [];
    menuSections.forEach(function(section, si) {
      section.items.forEach(function(item, ii) {
        var qty = parseInt(document.getElementById('qty_' + si + '_' + ii).textContent, 10);
        if (qty > 0) items.push({ name: item.name, price: item.price, qty: qty });
      });
    });

    if (items.length === 0) {
      return showError(errEl, '少なくとも1品お選びください。');
    }

    errEl.style.display = 'none';
    orderData = { name: name, email: email, phone: phone, pickupTime: pickupTime, items: items };
    renderConfirmation();
    showPage('page2');
    setStep(2);
  }

  function renderConfirmation() {
    document.getElementById('confirmCustomer').innerHTML =
      row('お名前',   orderData.name)
      + row('メール',   orderData.email)
      + row('電話番号', orderData.phone)
      + row('受取時刻', orderData.pickupTime);

    var total    = calcTotal();
    var itemHtml = orderData.items.map(function(i) {
      return row(i.name, i.qty + '本／個 × ¥' + i.price + ' ＝ ¥' + (i.price * i.qty).toLocaleString());
    }).join('');
    document.getElementById('confirmItems').innerHTML = itemHtml;
    document.getElementById('confirmTotal').textContent = '¥' + total.toLocaleString();
  }

  function goBack() { showPage('page1'); setStep(1); }

  function doSubmit() {
    var btn   = document.getElementById('submitBtn');
    var errEl = document.getElementById('err2');
    btn.disabled    = true;
    btn.textContent = '送信中...';

    var payload = {
      name:       orderData.name,
      email:      orderData.email,
      phone:      orderData.phone,
      pickupTime: orderData.pickupTime,
      items:      orderData.items.map(function(i) { return { name: i.name, qty: i.qty }; }),
    };

    fetch(GAS_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain' },
      body:    JSON.stringify(payload),
    })
      .then(function(r) { return r.json(); })
      .then(function(res) {
        if (res.success) {
          document.getElementById('resultOrderNum').textContent = res.orderNum;
          renderResultSummary();
          showPage('page3');
          setStep(3);
        } else {
          showError(errEl, '送信に失敗しました（' + (res.error || '不明なエラー') + '）。もう一度お試しください。');
          btn.disabled    = false;
          btn.textContent = 'この内容で注文を確定する';
        }
      })
      .catch(function() {
        showError(errEl, '通信エラーが発生しました。ページを再読み込みして再度お試しください。');
        btn.disabled    = false;
        btn.textContent = 'この内容で注文を確定する';
      });
  }

  function renderResultSummary() {
    var total    = calcTotal();
    var itemHtml = orderData.items.map(function(i) { return row(i.name, i.qty + '本／個'); }).join('');
    document.getElementById('resultSummary').innerHTML =
      '<div style="margin-top:4px">'
      + row('受取時刻', orderData.pickupTime)
      + itemHtml
      + '</div>'
      + '<div class="total-box" style="margin-top:10px">'
      + '<div class="t-label">合計金額（税込）</div>'
      + '<div class="t-amount">¥' + total.toLocaleString() + '</div></div>';
  }

  function calcTotal() {
    return orderData.items.reduce(function(s, i) { return s + i.price * i.qty; }, 0);
  }

  function row(label, value) {
    return '<div class="confirm-row">'
      + '<span class="confirm-label">' + esc(label) + '</span>'
      + '<span class="confirm-value">' + esc(value) + '</span>'
      + '</div>';
  }

  function showPage(id) {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }

  function setStep(active) {
    for (var i = 1; i <= 3; i++) {
      var el = document.getElementById('step' + i);
      el.className = 'step' + (i < active ? ' done' : i === active ? ' active' : '');
    }
  }

  function showError(el, msg) {
    el.textContent   = msg;
    el.style.display = 'block';
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;');
  }
</script>
</body>
</html>
